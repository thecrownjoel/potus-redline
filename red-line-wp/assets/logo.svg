<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#002147"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>

  <!-- Phone handset -->
  <g transform="translate(60,60)">
    <!-- Earpiece -->
    <rect x="-28" y="-38" width="18" height="24" rx="6" fill="#B22234" opacity="0.95"/>
    <!-- Mouthpiece -->
    <rect x="10" y="14" width="18" height="24" rx="6" fill="#B22234" opacity="0.95"/>
    <!-- Handle curve -->
    <path d="M-19,-18 C-19,10 19,10 19,18" stroke="#B22234" stroke-width="8" fill="none" stroke-linecap="round"/>

    <!-- Gold accent line on earpiece -->
    <rect x="-24" y="-32" width="10" height="3" rx="1.5" fill="#C9B06B" opacity="0.6"/>
    <!-- Gold accent line on mouthpiece -->
    <rect x="14" y="20" width="10" height="3" rx="1.5" fill="#C9B06B" opacity="0.6"/>
  </g>

  <!-- Status dot -->
  <circle cx="95" cy="25" r="8" fill="#2E7D32" opacity="0.9"/>
  <circle cx="95" cy="25" r="4" fill="#4CAF50"/>
</svg>
